<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>呼伦贝尔之行</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;touch-action:manipulation}
/* Header info */
#header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:linear-gradient(rgba(0,0,0,0.6),transparent);pointer-events:none}
#header>*{pointer-events:auto}
#header .title{font-size:14px;font-weight:600;letter-spacing:1px;opacity:0.8}
#header .counter{font-size:13px;opacity:0.6}
/* Slide container */
#slides{display:flex;height:100vh;transition:transform .35s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.slide{flex:0 0 100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.slide img,.slide video{max-width:100vw;max-height:100vh;object-fit:contain;user-select:none;-webkit-user-drag:none}
.slide video{max-height:90vh}
/* Navigation arrows */
.arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:10;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);color:#fff;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.arrow:active{background:rgba(255,255,255,0.25)}
#prev{left:8px}
#next{right:8px}
/* Dots indicator */
#dots{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:90vw;padding:4px 8px;background:rgba(0,0,0,0.3);border-radius:10px}
#dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);transition:background .2s,transform .2s}
#dots span.active{background:#fff;transform:scale(1.4)}
/* Watermark */
.watermark{position:fixed;bottom:20px;right:20px;z-index:10;color:rgba(255,255,255,0.2);font-size:12px;font-weight:300;letter-spacing:1px;pointer-events:none;transform:rotate(-12deg);text-shadow:0 1px 3px rgba(0,0,0,0.4);user-select:none}
/* Loading */
.loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none;opacity:0;transition:opacity .3s}
.loading.show{opacity:1}
.loading::after{content:'';width:24px;height:24px;border:2px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Responsive */
@media(max-width:640px){#header{padding:12px 16px}.arrow{width:36px;height:36px;font-size:18px}#prev{left:4px}#next{right:4px}.watermark{bottom:14px;right:14px;font-size:11px}#dots{bottom:12px;gap:5px}#dots span{width:5px;height:5px}}
</style>
</head>
<body>

<div id="header">
  <span class="title">呼伦贝尔之行</span>
  <span class="counter" id="counter"></span>
</div>

<div id="slides"></div>

<button class="arrow" id="prev">&#8249;</button>
<button class="arrow" id="next">&#8250;</button>

<div class="watermark">&copy; My Album</div>
<div class="loading" id="loading"></div>
<div id="dots"></div>

<script>
// ════════════════════════════════════════
//  配置
// ════════════════════════════════════════
const ALBUM_TITLE = '呼伦贝尔之行'
const WATERMARK_TEXT = '\u00A9 My Album'
const PHOTOS = [
  'photo-01.jpg','photo-02.jpg','photo-03.jpg','photo-04.jpg',
  'photo-05.jpg','photo-06.jpg','photo-07.jpg','photo-08.jpg',
  'photo-09.jpg','photo-10.jpg','photo-11.jpg','photo-12.jpg',
  'photo-13.jpg','photo-14.jpg','photo-15.jpg','photo-16.jpg',
  'photo-17.jpg','photo-18.jpg','photo-19.jpg','photo-20.jpg',
  'photo-21.jpg','photo-22.jpg','photo-23.jpg','photo-24.jpg',
  'photo-25.jpg','photo-26.jpg','photo-27.jpg','photo-28.jpg',
  'photo-29.jpg','photo-30.jpg','photo-31.jpg','photo-32.jpg',
  'photo-33.jpg','photo-34.jpg','photo-35.jpg','photo-36.jpg',
  'photo-37.jpg','photo-38.jpg','photo-39.jpg','photo-40.jpg',
  'photo-41.jpg','photo-42.jpg','photo-43.jpg','photo-44.jpg',
  'photo-45.jpg','photo-46.jpg','photo-47.jpg','photo-48.jpg',
  'photo-49.jpg','photo-50.jpg','photo-51.jpg','photo-52.jpg',
  'photo-53.jpg','photo-54.jpg','photo-55.jpg','photo-56.jpg','photo-57.jpg',
  'video-01.mp4','video-02.mp4','video-03.mp4','video-04.mp4','video-05.mp4','video-06.mp4',
]

// ════════════════════════════════════════
//  逻辑
// ════════════════════════════════════════
const VIDEO_EXTS = ['mp4','webm','mov','avi']
const isVideo = src => VIDEO_EXTS.includes(src.split('.').pop().toLowerCase())
const getMime = src => ({mp4:'video/mp4',webm:'video/webm',mov:'video/quicktime',avi:'video/x-msvideo'}[src.split('.').pop().toLowerCase()]||'video/mp4')

const items = PHOTOS.map(s => ({src:'photos/'+s,type:isVideo(s)?'video':'image'}))
const total = items.length
let current = 0
let isTransitioning = false

const $ = id => document.getElementById(id)
const slides = $('slides')
const counter = $('counter')
const loading = $('loading')
const header = $('header')

document.querySelector('.title').textContent = ALBUM_TITLE
document.querySelector('.watermark').textContent = WATERMARK_TEXT

function buildSlides() {
  slides.innerHTML = items.map((item, i) => {
    const active = i === 0 ? ' style="display:flex"' : ''
    const isVid = item.type === 'video'
    return `<div class="slide" data-index="${i}"${active}>${
      isVid
        ? `<video controls preload="metadata" muted playsinline data-src="${item.src}" data-loaded="false"></video>`
        : `<img src="${item.src}" alt="" data-index="${i}" data-loaded="true">`
    }</div>`
  }).join('')
}
buildSlides()

function updateCounter() { counter.textContent = `${current+1} / ${total}` }
function updateArrows() {
  $('prev').style.display = current === 0 ? 'none' : ''
  $('next').style.display = current === total - 1 ? 'none' : ''
}
function updateDots() {
  const dots = $('dots')
  dots.innerHTML = items.map((_, i) => `<span${i === current ? ' class="active"' : ''}></span>`).join('')
}

function showLoading() { loading.classList.add('show') }
function hideLoading() { loading.classList.remove('show') }

function goTo(index) {
  if (isTransitioning || index < 0 || index >= total || index === current) return
  isTransitioning = true
  showLoading()

  const prevSlide = slides.children[current]
  const nextSlide = slides.children[index]

  prevSlide.style.display = 'none'
  nextSlide.style.display = 'flex'
  current = index
  updateCounter()
  updateArrows()
  updateDots()

  // Load video if needed
  const vid = nextSlide.querySelector('video')
  if (vid && vid.dataset.loaded === 'false') {
    const src = vid.dataset.src
    vid.src = src
    vid.load()
    vid.dataset.loaded = 'true'
    vid.onloadeddata = () => { hideLoading(); isTransitioning = false }
    vid.onerror = () => { hideLoading(); isTransitioning = false }
  } else {
    hideLoading()
    isTransitioning = false
  }

  // Pause other videos
  slides.querySelectorAll('video').forEach(v => { if (v !== vid) v.pause() })
}

function goPrev() { goTo(current - 1) }
function goNext() { goTo(current + 1) }

$('prev').addEventListener('click', goPrev)
$('next').addEventListener('click', goNext)
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goPrev()
  if (e.key === 'ArrowRight') goNext()
})

// Edge tap/swipe (left 25% / right 25%)
let touchX = 0
document.addEventListener('touchstart', e => {
  const x = e.changedTouches[0].screenX
  const w = window.innerWidth
  if (x > w * 0.25 && x < w * 0.75) { touchX = 0; return }
  touchX = x
}, { passive: true })
document.addEventListener('touchend', e => {
  if (!touchX) return
  const ex = e.changedTouches[0].screenX
  const diff = touchX - ex
  const w = window.innerWidth
  if (Math.abs(diff) > 30) {
    diff > 0 ? goNext() : goPrev()
  } else {
    touchX < w * 0.25 ? goPrev() : goNext()
  }
  touchX = 0
}, { passive: true })

// Click left/right on slide to navigate
slides.addEventListener('click', e => {
  if (e.target.closest('video') || e.target.closest('.arrow')) return
  const x = e.clientX
  const w = window.innerWidth
  if (x < w * 0.3) goPrev()
  else if (x > w * 0.7) goNext()
})

// Init first slide (load video if needed)
const firstSlide = slides.children[0]
const firstVid = firstSlide.querySelector('video')
if (firstVid) {
  firstVid.src = firstVid.dataset.src
  firstVid.load()
  firstVid.dataset.loaded = 'true'
  firstVid.onerror = () => {}
}

updateCounter()
updateArrows()
updateDots()
hideLoading()
</script>
</body>
</html>
